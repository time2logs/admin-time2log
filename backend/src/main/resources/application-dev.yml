# Development Environment

spring:
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER}
    password: ${SMTP_PASSWORD}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
      mail.smtp.starttls.required: false

cors:
  allowed-origins: https://dev-admin.aeristo.cc

logging:
  level:
    ch.time2log: DEBUG
