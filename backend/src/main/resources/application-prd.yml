# Production Environment

spring:
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.ssl.enable: ${SMTP_TLS:false}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
