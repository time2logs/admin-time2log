<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="hsl(215 25% 15%)"/>
  <!-- Clock circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="hsl(199 80% 52%)" stroke-width="2"/>
  <!-- Hour hand (pointing to ~10 o'clock) -->
  <line x1="16" y1="16" x2="11.5" y2="10.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~12 o'clock) -->
  <line x1="16" y1="16" x2="16" y2="8" stroke="hsl(199 80% 52%)" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="white"/>
</svg>
